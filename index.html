<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNEYKING | Zaman ve Mekân</title>
    <style>
        /* 1. KURULUM VE SAAT TEMASI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0d1117; /* Derin siyah arka plan */
            color: #f5f5f5;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Dinamik Arka Plan: Saat Grid Efekti */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        /* 2. NAVBAR */
        .navbar {
            background-color: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #30363d;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #3b82f6;
        }
        .navbar nav a {
            color: #94a3b8;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            transition: 0.3s;
        }
        .navbar nav a:hover { color: #3b82f6; }

        /* 3. KARTLAR ALANI */
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: #161b22;
            border-radius: 20px;
            border: 1px solid #30363d;
            overflow: hidden;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #3b82f6;
            box-shadow: 0 10px 30px rgba(59, 130, 246, 0.15);
        }
        
        /* 4. ÖZEL GRAFİK ALANLARI */
        .card-img {
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
            border-bottom: 1px solid #30363d;
            position: relative;
            overflow: hidden;
        }

        /* Eşit Boyutlu Gotik Stilize Neon 62 Logosu */
        .neon-62 {
            font-size: 80px;
            font-weight: 900;
            color: #00f0ff;
            font-family: 'Georgia', serif;
            text-shadow: 
                0 0 5px #00f0ff,
                0 0 10px #00f0ff,
                0 0 20px #002aff,
                0 0 40px #002aff;
            letter-spacing: -2px;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .neon-62 span {
            font-size: 80px; /* Her iki rakamın da boyutu tamamen eşitlendi */
            display: inline-block;
        }

        /* Eskisi Gibi Klasik Keskin Kum Saati Efekti */
        .cyber-hourglass {
            position: relative;
            width: 50px;
            height: 80px;
            border: 4px solid #00f0ff;
            border-radius: 8px; /* Klasik köşeli dış kutu */
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            animation: flip 6s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4px;
        }
        /* Keskin Üçgen İç Hazneler (Eski Hali) */
        .hourglass-top, .hourglass-bottom {
            width: 100%;
            height: 32px;
            background: #00f0ff;
            filter: drop-shadow(0 0 5px #00f0ff);
            transition: 0.5s;
        }
        .hourglass-top {
            clip-path: polygon(0 0, 100% 0, 50% 100%); /* Aşağı bakan üçgen */
        }
        .hourglass-bottom {
            clip-path: polygon(50% 0, 0 100%, 100% 100%); /* Yukarı bakan üçgen */
        }
        @keyframes flip {
            0%, 90% { transform: rotate(0deg); }
            95%, 100% { transform: rotate(180deg); }
        }

        /* Beyin Emojisi İçin Özel Efekt */
        .glowing-brain {
            font-size: 65px;
            filter: drop-shadow(0 0 15px rgba(236, 72, 153, 0.6));
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Sudoku Emojisi Özel Efekti */
        .glowing-sudoku {
            font-size: 65px;
            filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.6));
            animation: pulse 2.5s infinite ease-in-out;
        }

        .card-content { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-title { font-size: 21px; font-weight: 700; margin-bottom: 12px; color: #f5f5f5; }
        .card-desc { font-size: 14px; color: #8b949e; line-height: 1.6; margin-bottom: 20px; }
        
        .card-btn {
            width: 100%;
            background: transparent;
            color: #3b82f6;
            border: 1px solid #3b82f6;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .card-btn:hover { background: #3b82f6; color: white; }

        /* 5. MODALLAR (PENCERELER) */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background: #0d1117;
            border: 1px solid #3b82f6;
            border-radius: 24px;
            width: 95%; max-width: 550px;
            padding: 30px;
            position: relative;
            text-align: center;
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            max-height: 95vh;
            overflow-y: auto;
        }
        .close-btn {
            position: absolute; right: 25px; top: 20px;
            font-size: 30px; cursor: pointer; color: #8b949e;
        }

        /* GİRİŞ ELEMANLARI */
        .input-group { margin: 20px 0; }
        input {
            width: 100%;
            padding: 15px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 10px;
            color: white;
            font-size: 18px;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #3b82f6; }
        
        .action-btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }
        .action-btn:hover {
            background: #2563eb;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* OYUN İÇİ SAYAÇLAR */
        .game-status-bar {
            display: flex;
            justify-content: space-around;
            margin: 15px 0;
            font-size: 14px;
            color: #8b949e;
        }
        .game-status-bar span strong { color: #3b82f6; }

        /* YAŞAM DASHBOARDU TASARIMI */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        .metric-box {
            background: #161b22;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .metric-val { font-size: 18px; font-weight: 700; color: #3b82f6; margin-bottom: 5px; text-align: center;}
        .metric-lbl { font-size: 11px; color: #8b949e; text-transform: uppercase; text-align: center; }
        .live-seconds {
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            color: #f5f5f5;
            margin: 20px 0 10px;
            letter-spacing: 2px;
        }

        /* HAFIZA OYUNU GRID TASARIMI */
        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px auto;
            max-width: 360px;
        }
        .memory-card {
            aspect-ratio: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s, border-color 0.3s;
        }
        .memory-card:active {
            transform: scale(0.95);
        }
        .memory-card.flipped {
            background: #1f2937;
            border-color: #3b82f6;
            transform: rotateY(180deg);
        }
        .memory-card.matched {
            background: rgba(16, 185, 129, 0.1);
            border-color: #10b981;
            cursor: default;
        }

        /* SUDOKU GRID TASARIMI */
        .sudoku-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 15px;
        }
        .sudoku-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            border: 3px solid #3b82f6;
            background-color: #30363d;
            max-width: 380px;
            width: 100%;
            aspect-ratio: 1;
            margin-bottom: 15px;
        }
        .sudoku-cell {
            background: #161b22;
            border: 1px solid #21262d;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #3b82f6;
            cursor: pointer;
            user-select: none;
        }
        .sudoku-cell:focus {
            outline: none;
            background: #1f2937;
        }
        /* Kalın Sudoku Bölme Çizgileri */
        .sudoku-cell:nth-child(3n) { border-right: 2px solid #3b82f6; }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        .sudoku-grid > div:nth-child(n+19):nth-child(-n+27),
        .sudoku-grid > div:nth-child(n+46):nth-child(-n+54) {
            border-bottom: 2px solid #3b82f6;
        }
        /* Kullanıcının girdiği sayılar */
        .sudoku-cell.user-filled {
            color: #00f0ff;
        }
        /* Seçili Hücre */
        .sudoku-cell.selected {
            background: rgba(59, 130, 246, 0.3) !important;
        }
        /* Sayı Giriş Paneli */
        .sudoku-numbers {
            display: flex;
            justify-content: center;
            gap: 5px;
            width: 100%;
            max-width: 380px;
            margin-bottom: 15px;
        }
        .sudoku-num-btn {
            flex: 1;
            aspect-ratio: 1;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .sudoku-num-btn:hover {
            background: #3b82f6;
            border-color: #3b82f6;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">GÜNEYKING</div>
        <nav>
            <a href="#">Ana Sayfa</a>
            <a href="#">Uygulamalar</a>
            <a href="#">Hakkında</a>
            <a href="#">İletişim</a>
        </nav>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-img">
                <div class="neon-62"><span>6</span><span>2</span></div>
            </div>
            <div class="card-content">
                <div>
                    <div class="card-title">Sayı Tahmin Oyunu 2.0</div>
                    <div class="card-desc">1 ile 100 arasında bir sayı tuttuk. 6 hakkın var, bakalım kaç hamlede bulacaksın?</div>
                </div>
                <button class="card-btn" onclick="openModal('guessModal')">OYUNU BAŞLAT</button>
            </div>
        </div>

        <div class="card">
            <div class="card-img">
                <div class="cyber-hourglass">
                    <div class="hourglass-top"></div>
                    <div class="hourglass-bottom"></div>
                </div>
            </div>
            <div class="card-content">
                <div>
                    <div class="card-title">Zaman Yolculuğu 2.0</div>
                    <div class="card-desc">Biyometrik verilerini, burcunu, jenerasyonunu ve kalan günlerini anlık takip et.</div>
                </div>
                <button class="card-btn" onclick="openModal('ageModal')">DASHBOARD'U AÇ</button>
            </div>
        </div>

        <div class="card">
